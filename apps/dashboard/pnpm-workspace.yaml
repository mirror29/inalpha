# pnpm 11 用 `allowBuilds`（布尔 map）批准依赖 build script。全设 true 让
# @parcel/watcher / @swc/core / sharp / esbuild 的 build script 正常执行；否则被判
# ignored，`pnpm install` 在 CI（CI=true 严格模式）因 ERR_PNPM_IGNORED_BUILDS exit 1。
# 本仓 .gitignore 默认忽略 pnpm-workspace.yaml，dashboard 用 `!` 例外提交此文件。
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  sharp: true
  esbuild: true
  '@scarf/scarf': false
verifyDepsBeforeRun: false
# 去重 @ag-ui/client / @ag-ui/core 到 0.0.53：@copilotkit@1.59.5 把这两个硬钉到 0.0.53,
# 而 @ag-ui/mastra 只声明 peer >=0.0.44 → pnpm 会把它浮到 0.0.54,造成 tree 里两份
# AbstractAgent 类身份(instanceof 失配,正是 CR 担心的"版本不匹配走错路径")。统一钉到
# copilotkit 实际构建/测试的 0.0.53,消除重复。@ag-ui/mastra 的 peer(>=0.0.44)仍满足。
overrides:
  '@ag-ui/client': 0.0.53
  '@ag-ui/core': 0.0.53
