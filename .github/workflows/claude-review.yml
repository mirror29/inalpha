name: Claude PR Review

# PR 打开 / 新 commit / reopen 时自动 review diff。
# 非阻塞设计：即使 Claude 出错（API 超时、token 过期等），
# 本 workflow 不会阻止 PR 合并。review 评论是锦上添花，不是门禁。
# Auth: Max/Pro 订阅 OAuth（CLAUDE_CODE_OAUTH_TOKEN），本地 `claude setup-token` 生成

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 手动指定 PR 编号（留空 = 用 workflow_dispatch 的当前分支）
        required: false

# 同一 PR 新 push 立刻取消上一次 review，避免重复评论
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude · auto-review PR diff（非阻塞）
    runs-on: ubuntu-latest
    # 🔑 非阻塞关键：即使本 job 失败，也标记为成功，不卡 PR 合并
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        id: review
        # 内层 step 也 continue-on-error，防止 action 抛异常
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

            按 Inalpha 仓库 CLAUDE.md（§3 协作硬约束 + §3.1 金融时效性 + §3.2 prompt 工程纪律 + §4 CI 红线）review 本 PR diff。

            ## 必查 red flag

            1. **Prompt / Agent 工程纪律**（§3.2）：
               - tool description 缺三段式（功能 + 何时用 + 何时不用 + 坑）
               - prompt 预设了具体输入示例 / 锁死预期
               - prompt 硬编码语言 / 市场 / 品种
               - 示例 ticker / venue 没标"仅供识别格式"

            2. **金融时效性**（§3.1）：
               - DataClient.get_bars 意图是"最新 / 现价"但没传 fresh=True
               - 判 freshness 看 bar 数量而非 bars[-1].ts 与 as_of 的间隔
               - prompt 引用具体日期 / 数值 / 事件结论无数据源
               - 新加 connector 未考虑 freshness 默认（金融默认 fresh=True）

            3. **commit 完整性**（§4）：
               - 新加 import 但被引用的实现文件未出现在 diff（漏 git add）

            4. **CI 红线**（§4）：
               - 公开文档引用了 docs/miro/ 私有路径
               - 模块顶层 eager 调 getSettings() 但没在 tests/setup.ts 注入默认 env

            5. **多空意识**：
               - long-only 策略加了 SHORT/COVER 信号
               - 用 SELL 表示做空（应该用 SHORT 开空、COVER 平空）

            6. **命名 / 不要碰**：
               - Python 包不是 inalpha_<service> snake_case
               - tool 命名不是 <service>.<verb> 或 mcp__<server>__<verb>
               - 改了 services/_shared/ 但 PR 描述没说明
               - .mastra/ / docs/miro/ 出现在 diff

            7. **通用 bug pattern**（仓库历史反复踩过）：
               - 异常处理：子类 override 是否真的生效
               - 时间精度：float64 时间戳跨越大数值时丢精度
               - 资源上限：HTTP / DB / backfill 跨度参数有没有 cap
               - 并发 ID：多 worker 下 counter / nonce / order_id 是否重复
               - 事务原子性：多步状态转变中间步失败是否回滚

            ## review 行为

            - PR 分支已 checkout 在当前工作目录
            - **severity 阈值**：只贴 ≥ medium 的 inline 评论；nit / 风格 → 跳过
            - **不重复 lint**：ruff / tsc / mypy 已能抓的不要再提
            - 找到 red flag → 用 `mcp__github_inline_comment__create_inline_comment` 贴到具体 line
            - **inline 格式**：`[critical|major|medium] 一句描述 — 依据 CLAUDE.md §X.X`
            - 顶层总结用 `gh pr comment` 发，分两段：1) 必修（critical / major）2) 可选优化（medium）
            - 没问题 → 一段中文 LGTM，不要硬挑刺
            - 只贴 GitHub 评论，不要把审查文字当聊天消息发

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*)"

      # 即使 Claude 挂了，也记录一下方便排查
      - name: Log review status
        if: always()
        run: |
          if [ "${{ steps.review.outcome }}" = "success" ]; then
            echo "Claude review completed successfully"
          else
            echo "Claude review skipped or failed (non-blocking) — outcome: ${{ steps.review.outcome }}"
          fi
