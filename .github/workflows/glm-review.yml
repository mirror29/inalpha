name: GLM PR Review

# PR 打开 / reopen / 每次 push 新 commit（synchronize）时自动 review diff。
# 防邮件洪水靠三道闸：① concurrency + cancel-in-progress 让同一 PR
# 新 push 立刻取消上一轮；② review step 只维护一条 sticky 总结评论
# （gh pr comment --edit-last 原地覆盖，GitHub 对编辑评论不发邮件，仅首条发一封）；
# ③ 不逐行贴 inline 评论。
# 非阻塞设计：GLM 出错不阻止 PR 合并。
# Auth: 智谱 GLM API key 存在 GitHub Actions Secret ZHIPUAI_API_KEY
#
# 所有 review 逻辑在 scripts/glm_review.py（Python），workflow 只做编排，
# 避免 YAML/heredoc/shell 三层转义之争（2026-07-03 教训）。

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 手动指定 PR 编号
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: GLM-5.2 · auto-review PR
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          gh pr diff "$PR_NUMBER" --color never > /tmp/pr_diff.txt
          echo "diff_lines=$(wc -l < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT
          gh pr view "$PR_NUMBER" --json title --jq '.title' > /tmp/pr_title.txt

      - name: Run GLM review
        id: review
        env:
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: python3 scripts/glm_review.py

      - name: Post/Update sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          REVIEW_BODY=$(cat /tmp/review_body.txt)
          SHA=$(git rev-parse --short HEAD)
          FULL_BODY="<!-- glm-review -->\nReview base: ${SHA}\n\n${REVIEW_BODY}"
          gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body "$(echo -e "$FULL_BODY")"

      - name: Log review status
        if: always()
        run: echo "GLM review completed (non-blocking)"