name: inalpha-prod

# Inalpha 生产部署（单机 / Hetzner VPS）—— 见 docs/miro/decisions/0042
#
# 起：  docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --build
# 迁移：migrate 服务一次性跑 alembic upgrade head（profile=migrate 或随 up 自动先跑）
# 停：  docker compose -f infra/docker-compose.prod.yml down
#
# 拓扑：postgres + redis + migrate(一次性) + data/paper/research/factor + mastra + cloudflared
# 仅 cloudflared 对公网；其余服务走容器内网，按服务名互访。
#
# 镜像策略(见 0058):各服务同时声明 image: + build:。
#   - 默认部署(scripts/deploy.sh):`compose pull` 拉 GHCR 预构建镜像 → `up -d`,VPS 不 build。
#   - 应急本地构建:`up -d --build`(小内存机注意 OOM)。
#   image 路径由 IMAGE_PREFIX/IMAGE_TAG 注入(见 .env.prod.example);CI 见 build-images.yml。

x-python-build: &python-build
  context: ../services
  dockerfile: ../infra/docker/Dockerfile.python

x-svc-common: &svc-common
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  env_file: [../infra/.env.prod]

services:
  postgres:
    # 数据库镜像必须钉版本:latest-pg17 浮动 tag 在 pull/重建时可能拉到新版
    # TimescaleDB,轻则起不来重则静默破坏已有 hypertable。升级走显式改版本号。
    image: timescale/timescaledb:2.27.2-pg17
    container_name: inalpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-inalpha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_preload_libraries=timescaledb
      -c max_connections=200 -c shared_buffers=512MB -c work_mem=32MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-inalpha}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 不映射端口到公网；仅容器内网可达

  redis:
    image: redis:8-alpine
    container_name: inalpha-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # requirepass:同 Docker 网络内的容器被横向入侵时,Redis 不再是免认证跳板。
    # 客户端连接串同步用 redis://:password@redis:6379/0(见 .env.prod.example)。
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:?required}"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}

  # 一次性：跑 DB 迁移到最新，app 服务依赖它 completed_successfully
  migrate:
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-paper:${IMAGE_TAG:-latest}
    build:
      <<: *python-build
      args: { SERVICE: paper }   # 复用 paper 镜像（含 DB 依赖）；alembic 由 _shared/paper 提供
    container_name: inalpha-migrate
    restart: "no"
    env_file: [../infra/.env.prod]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../infra/migrations:/app/migrations:ro
    working_dir: /app
    # alembic 已是 paper 的**显式直接依赖**(services/paper/pyproject.toml,
    # 不再依赖 optuna 的传递依赖,上游换后端也不会让迁移静默消失)
    # 必须先 cd 到 migrations 目录:alembic.ini 的 script_location=. 按 CWD 解析,
    # 否则在 /app 下找不到 env.py（ADR-0058 真机实测修复）。--project 用绝对路径。
    command: ["sh", "-c", "cd /app/migrations && uv --project /app/paper run alembic -c alembic.ini upgrade head"]

  data:
    <<: *svc-common
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-data:${IMAGE_TAG:-latest}
    build: { <<: *python-build, args: { SERVICE: data } }
    container_name: inalpha-data
    environment:
      PORT: 8001
      WORKERS: 2          # web-search 堵事件循环 → 多 worker 缓解
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  paper:
    <<: *svc-common
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-paper:${IMAGE_TAG:-latest}
    build: { <<: *python-build, args: { SERVICE: paper } }
    container_name: inalpha-paper
    environment:
      PORT: 8002
      WORKERS: 1          # 硬约束：in-process live runner，必须单进程/单副本
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  research:
    <<: *svc-common
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-research:${IMAGE_TAG:-latest}
    build: { <<: *python-build, args: { SERVICE: research } }
    container_name: inalpha-research
    environment: { PORT: 8003, WORKERS: 1 }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  factor:
    <<: *svc-common
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-factor:${IMAGE_TAG:-latest}
    build: { <<: *python-build, args: { SERVICE: factor } }
    container_name: inalpha-factor
    environment: { PORT: 8004, WORKERS: 1 }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  mastra:
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-mastra:${IMAGE_TAG:-latest}
    build:
      context: ../packages/orchestration
      dockerfile: ../../infra/docker/Dockerfile.mastra
    container_name: inalpha-mastra
    restart: unless-stopped
    env_file: [../infra/.env.prod]
    environment:
      NODE_ENV: production
      # 服务间走容器名互访
      DATA_SERVICE_URL: http://data:8001
      PAPER_SERVICE_URL: http://paper:8002
      RESEARCH_SERVICE_URL: http://research:8003
      FACTOR_SERVICE_URL: http://factor:8004
    depends_on: [data, paper, research, factor]
    volumes:
      - mastra_data:/app/.data            # @mastra/libsql 本地存储持久化（paths.ts resolveMastraDbDir() 返回 .data/ 而非 .mastra/）
      - mastra_backups:/app/.data-backups  # 每日自动备份轮转持久化
    healthcheck:
      # node 镜像无 curl,用内置 fetch;任何 <500 响应都算活(只验进程就绪,不验业务)
      test: ["CMD", "node", "-e", "fetch('http://localhost:4111/api').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # 操作者控制台(Next16 standalone)。BFF 经容器名直连后端,零 CORS、JWT 同源(共用 .env.prod)。
  # 公网仅经 Cloudflare Tunnel 暴露 dashboard.inalpha.dev → dashboard:3001;后端服务一律不暴露。
  dashboard:
    image: ${IMAGE_PREFIX:-ghcr.io/__CHANGE_ME__}/inalpha-dashboard:${IMAGE_TAG:-latest}
    build:
      context: ../apps/dashboard
      dockerfile: ../../infra/docker/Dockerfile.dashboard
    container_name: inalpha-dashboard
    restart: unless-stopped
    # 凭据隔离(最小权限):dashboard 是公网前端,**不挂 env_file** —— 那会把 DB/Redis/LLM/
    # Binance/tunnel 全部凭据注入前端容器(RCE 即全泄)。BFF 实际只需 JWT_SECRET + 5 个内网 URL;
    # JWT_SECRET 经 compose 从 .env.prod 插值,只此一个 secret 进容器。
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CONSOLE_SUBJECT: ${CONSOLE_SUBJECT:-console:dev}
      CONSOLE_EMAIL: ${CONSOLE_EMAIL:-console@inalpha.dev}
      MASTRA_URL: http://mastra:4111
      PAPER_SERVICE_URL: http://paper:8002
      DATA_SERVICE_URL: http://data:8001
      RESEARCH_SERVICE_URL: http://research:8003
      FACTOR_SERVICE_URL: http://factor:8004
    # 等后端 healthy 再起,避免冷启动期 BFF 路由全 502
    depends_on:
      mastra: { condition: service_healthy }
      paper: { condition: service_healthy }
      data: { condition: service_healthy }
      research: { condition: service_healthy }
      factor: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/en').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  # 公网入口：Cloudflare Tunnel（无需在 VPS 开入站端口，TLS/防护走 CF）
  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    container_name: inalpha-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?required}
    # service_healthy:mastra 初始化完成前不开始对外转发(默认 service_started
    # 会让 Tunnel 在 mastra 还没就绪时把流量打到 502)
    depends_on:
      mastra:
        condition: service_healthy
    # token 远程托管模式：在 CF 控制台配 ingress，把 api.域名 → http://mastra:4111
    # （或各 svc 单独子域）。本地 config.yml 模式则改挂 ./cloudflared:/etc/cloudflared

volumes:
  postgres_data:
  redis_data:
  mastra_data:
  mastra_backups:
