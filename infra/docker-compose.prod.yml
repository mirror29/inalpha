name: inalpha-prod

# Inalpha 生产部署（单机 / Hetzner VPS）—— 见 docs/miro/decisions/0042
#
# 起：  docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --build
# 迁移：migrate 服务一次性跑 alembic upgrade head（profile=migrate 或随 up 自动先跑）
# 停：  docker compose -f infra/docker-compose.prod.yml down
#
# 拓扑：postgres + redis + migrate(一次性) + data/paper/research/factor + mastra + cloudflared
# 仅 cloudflared 对公网；其余服务走容器内网，按服务名互访。

x-python-build: &python-build
  context: ../services
  dockerfile: ../infra/docker/Dockerfile.python

x-svc-common: &svc-common
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  env_file: [../infra/.env.prod]

services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: inalpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-inalpha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_preload_libraries=timescaledb
      -c max_connections=200 -c shared_buffers=512MB -c work_mem=32MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-inalpha}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 不映射端口到公网；仅容器内网可达

  redis:
    image: redis:8-alpine
    container_name: inalpha-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 一次性：跑 DB 迁移到最新，app 服务依赖它 completed_successfully
  migrate:
    build:
      <<: *python-build
      args: { SERVICE: paper }   # 复用 paper 镜像（含 DB 依赖）；alembic 由 _shared/paper 提供
    container_name: inalpha-migrate
    restart: "no"
    env_file: [../infra/.env.prod]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../infra/migrations:/app/migrations:ro
    working_dir: /app
    # alembic 已是 paper 的**显式直接依赖**(services/paper/pyproject.toml,
    # 不再依赖 optuna 的传递依赖,上游换后端也不会让迁移静默消失)
    command: ["sh", "-c", "uv --project paper run alembic -c /app/migrations/alembic.ini upgrade head"]

  data:
    <<: *svc-common
    build: { <<: *python-build, args: { SERVICE: data } }
    container_name: inalpha-data
    environment:
      PORT: 8001
      WORKERS: 2          # web-search 堵事件循环 → 多 worker 缓解
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  paper:
    <<: *svc-common
    build: { <<: *python-build, args: { SERVICE: paper } }
    container_name: inalpha-paper
    environment:
      PORT: 8002
      WORKERS: 1          # 硬约束：in-process live runner，必须单进程/单副本
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  research:
    <<: *svc-common
    build: { <<: *python-build, args: { SERVICE: research } }
    container_name: inalpha-research
    environment: { PORT: 8003, WORKERS: 1 }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  factor:
    <<: *svc-common
    build: { <<: *python-build, args: { SERVICE: factor } }
    container_name: inalpha-factor
    environment: { PORT: 8004, WORKERS: 1 }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  mastra:
    build:
      context: ../packages/orchestration
      dockerfile: ../../infra/docker/Dockerfile.mastra
    container_name: inalpha-mastra
    restart: unless-stopped
    env_file: [../infra/.env.prod]
    environment:
      NODE_ENV: production
      # 服务间走容器名互访
      DATA_SERVICE_URL: http://data:8001
      PAPER_SERVICE_URL: http://paper:8002
      RESEARCH_SERVICE_URL: http://research:8003
      FACTOR_SERVICE_URL: http://factor:8004
    depends_on: [data, paper, research, factor]
    volumes:
      - mastra_data:/app/.mastra   # @mastra/libsql 本地存储持久化
    healthcheck:
      # node 镜像无 curl,用内置 fetch;任何 <500 响应都算活(只验进程就绪,不验业务)
      test: ["CMD", "node", "-e", "fetch('http://localhost:4111/api').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # 公网入口：Cloudflare Tunnel（无需在 VPS 开入站端口，TLS/防护走 CF）
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: inalpha-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?required}
    # service_healthy:mastra 初始化完成前不开始对外转发(默认 service_started
    # 会让 Tunnel 在 mastra 还没就绪时把流量打到 502)
    depends_on:
      mastra:
        condition: service_healthy
    # token 远程托管模式：在 CF 控制台配 ingress，把 api.域名 → http://mastra:4111
    # （或各 svc 单独子域）。本地 config.yml 模式则改挂 ./cloudflared:/etc/cloudflared

volumes:
  postgres_data:
  redis_data:
  mastra_data:
