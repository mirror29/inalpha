[alembic]
# 当前目录就是 alembic 项目根（env.py + versions/ 都在这里）
script_location = .
prepend_sys_path = .

# version 文件名：<rev>_<slug>.py
file_template = %%(rev)s_%%(slug)s

version_path_separator = os

# sqlalchemy.url 在 env.py 里被 DATABASE_URL 环境变量覆盖，这里只是占位
sqlalchemy.url = postgresql+psycopg://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
