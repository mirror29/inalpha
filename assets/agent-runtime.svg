<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Cascadia Code', 'Menlo', monospace; }
      .bg { fill: #0f131a; }
      .layer-bg { fill: #131822; stroke: #1e293b; stroke-width: 1; rx: 4; }
      .layer-label { fill: #475569; font-size: 10px; letter-spacing: 2px; }
      .box { fill: #1a2234; stroke: #1e293b; stroke-width: 1; rx: 3; }
      .box-cyan { fill: #1a2234; stroke: #5fb3ff; stroke-width: 1.5; rx: 3; }
      .box-dash { fill: transparent; stroke: #334155; stroke-width: 1; stroke-dasharray: 4 3; rx: 3; }
      .box-title { fill: #e2e8f0; font-size: 13px; font-weight: 600; }
      .box-sub { fill: #64748b; font-size: 11px; }
      .box-title-cyan { fill: #5fb3ff; font-size: 13px; font-weight: 600; }
      .box-sub-cyan { fill: #3b82f6; font-size: 11px; }
      .divider { stroke: #1e293b; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" class="bg"/>

  <!-- ====== LAYER 1: User Entry ====== -->
  <rect x="50" y="30" width="1100" height="75" class="layer-bg"/>
  <text x="65" y="52" class="layer-label">L1 · USER ENTRY</text>
  <rect x="470" y="42" width="260" height="50" class="box-cyan"/>
  <text x="600" y="62" text-anchor="middle" class="box-title-cyan">User</text>
  <text x="600" y="78" text-anchor="middle" class="box-sub-cyan">mastra dev · CLI</text>

  <!-- ====== LAYER 2: Orchestration ====== -->
  <rect x="50" y="120" width="1100" height="180" class="layer-bg"/>
  <text x="65" y="142" class="layer-label">L2 · PACKAGES / ORCHESTRATION  ·  MASTRA</text>

  <!-- Row 1: agents, tools, middleware -->
  <rect x="80" y="158" width="220" height="60" class="box"/>
  <text x="190" y="182" text-anchor="middle" class="box-title">agents</text>
  <text x="190" y="200" text-anchor="middle" class="box-sub">orchestrator · trader · risk</text>

  <rect x="320" y="158" width="220" height="60" class="box"/>
  <text x="430" y="182" text-anchor="middle" class="box-title">tools</text>
  <text x="430" y="200" text-anchor="middle" class="box-sub">plan/exec · data/paper reads</text>

  <rect x="560" y="158" width="220" height="60" class="box"/>
  <text x="670" y="182" text-anchor="middle" class="box-title">middleware</text>
  <text x="670" y="200" text-anchor="middle" class="box-sub">hooks · permissions · stop</text>

  <!-- Row 2: plan-store, memory, telemetry -->
  <rect x="80" y="228" width="220" height="54" rx="27" class="box"/>
  <text x="190" y="250" text-anchor="middle" class="box-title">plan-store</text>
  <text x="190" y="267" text-anchor="middle" class="box-sub">approval tokens</text>

  <rect x="320" y="228" width="220" height="54" rx="27" class="box"/>
  <text x="430" y="250" text-anchor="middle" class="box-title">memory</text>
  <text x="430" y="267" text-anchor="middle" class="box-sub">Mastra + PostgresStore</text>

  <rect x="560" y="228" width="220" height="54" class="box-dash"/>
  <text x="670" y="250" text-anchor="middle" class="box-sub">telemetry (E+)</text>
  <text x="670" y="267" text-anchor="middle" class="box-sub">ADR-0015</text>

  <!-- ====== LAYER 3: Python Kernel ====== -->
  <rect x="50" y="315" width="1100" height="120" class="layer-bg"/>
  <text x="65" y="337" class="layer-label">L3 · PYTHON KERNEL  ·  FASTAPI</text>

  <rect x="80" y="353" width="240" height="60" class="box"/>
  <text x="200" y="377" text-anchor="middle" class="box-title">services/data</text>
  <text x="200" y="395" text-anchor="middle" class="box-sub">market data ingest</text>

  <rect x="340" y="353" width="240" height="60" class="box"/>
  <text x="460" y="377" text-anchor="middle" class="box-title">services/paper</text>
  <text x="460" y="395" text-anchor="middle" class="box-sub">backtest · paper · live</text>

  <rect x="600" y="353" width="220" height="60" class="box-dash"/>
  <text x="710" y="377" text-anchor="middle" class="box-sub">services/research (E)</text>
  <text x="710" y="395" text-anchor="middle" class="box-sub">multi-agent debate</text>

  <rect x="840" y="353" width="220" height="60" class="box-dash"/>
  <text x="950" y="377" text-anchor="middle" class="box-sub">Strategy Evolution (E+)</text>
  <text x="950" y="395" text-anchor="middle" class="box-sub">code evolution loop</text>

  <!-- ====== LAYER 4: Persistence ====== -->
  <rect x="50" y="450" width="1100" height="120" class="layer-bg"/>
  <text x="65" y="472" class="layer-label">L4 · PERSISTENCE &amp; EXTERNAL</text>

  <rect x="80" y="488" width="280" height="54" rx="27" class="box"/>
  <text x="220" y="510" text-anchor="middle" class="box-title">Postgres + TimescaleDB</text>
  <text x="220" y="527" text-anchor="middle" class="box-sub">all time-series &amp; business state</text>

  <rect x="390" y="488" width="300" height="54" class="box"/>
  <text x="540" y="510" text-anchor="middle" class="box-title">Exchanges &amp; Markets</text>
  <text x="540" y="527" text-anchor="middle" class="box-sub">via CCXT · multi-venue</text>

  <rect x="720" y="488" width="300" height="54" class="box"/>
  <text x="870" y="510" text-anchor="middle" class="box-title">LLM Provider</text>
  <text x="870" y="527" text-anchor="middle" class="box-sub">Anthropic · OpenAI · DeepSeek</text>

</svg>
